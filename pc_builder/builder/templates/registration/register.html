{% extends "builder/base.html" %}
{% block title %}Rejestracja{% endblock %}
{% block content %}
<h1>Rejestracja</h1>
<form method="post" class="auth-form">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn primary" type="submit">Utwórz konto</button>
</form>
<p>Masz konto? <a href="{% url 'login' %}">Zaloguj się</a></p>
{% endblock %}
